name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, pdo_mysql, bcmath
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Pint (PHP Linting)
        run: ./vendor/bin/pint --test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check .

      - name: Typecheck (TypeScript)
        run: npx tsc --noEmit

  test:
    name: Tests (Unit & E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, pdo_mysql, bcmath
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Create .env.testing
        run: |
          cp .env.testing.example .env.testing
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=db_test/' .env.testing
          sed -i 's/DB_DATABASE=test/DB_DATABASE=nexus_test/' .env.testing
          sed -i 's/DB_USERNAME=root/DB_USERNAME=nexus_user/' .env.testing
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=nexus_password/' .env.testing
          echo "MEILISEARCH_HOST=http://meilisearch_test:7700" >> .env.testing
          echo "MEILI_MASTER_KEY=masterKey" >> .env.testing
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env.testing

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Run Tests
        run: bash bin/test-all.sh

      - name: Verify Frontend Build
        run: |
          docker compose -f docker-compose.test.yml up -d app_test
          docker compose -f docker-compose.test.yml exec -T app_test npm run build
