services:
  # 1. The PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www:z
    networks:
      - nexus-network
    ports:
    - "5173:5173"

  # 2. The Web Server (Nginx)
  nginx:
    image: nginx:alpine
    container_name: nexus_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www:z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - nexus-network

  # 3. The Database
  db:
    image: mysql:8.0
    container_name: nexus_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - nexus-network

  # 4. Meilisearch
  meilisearch:
    image: 'getmeili/meilisearch:latest'
    container_name: nexus_meilisearch
    ports:
      - '7700:7700'
    volumes:
      - 'meilisearch-data:/meili_data'
    networks:
      - nexus-network
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
      MEILI_NO_ANALYTICS: 'true'
    restart: unless-stopped

  # 5. Playwright E2E Testing
  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    container_name: nexus_playwright
    volumes:
      - ./:/var/www:z
    working_dir: /var/www
    networks:
      - nexus-network
    depends_on:
      - nginx

networks:
  nexus-network:
    driver: bridge

volumes:
  dbdata:
  meilisearch-data: